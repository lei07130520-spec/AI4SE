name: AI4SE Daily Briefing

on:
  schedule:
    # 每天 21:00 北京时间 = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ai4se-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate briefing (MD + HTML)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_daily.py --days 3

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: AI4SE daily briefing $(date -u +%Y-%m-%d)"
          git push
